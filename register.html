<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact The Trade Diaries | Trading Course Enquiry</title>
<meta name="description" content="Contact The Trade Diaries for practical trading education focused on discipline, risk management, journaling, and real market review.">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://thetradediaries.com/register.html">
<meta property="og:type" content="website">
<meta property="og:title" content="Contact The Trade Diaries | Trading Course Enquiry">
<meta property="og:description" content="Share your details for practical trading education focused on process, discipline, journaling, and real market review.">
<meta property="og:url" content="https://thetradediaries.com/register.html">
<meta property="og:site_name" content="The Trade Diaries">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Contact The Trade Diaries | Trading Course Enquiry">
<meta name="twitter:description" content="Send an enquiry for The Trade Diaries practical trading education program.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body class="register-page-bg">
<header class="site-header">
    <div class="container header-inner">
        <a href="index.html" class="brand-link" aria-label="The Trade Diaries home">
            <span>THE</span><span>TRADE</span><span>DIARIES</span>
        </a>

        <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="primaryNav">
            <span class="nav-toggle-line"></span>
            <span class="nav-toggle-line"></span>
            <span class="nav-toggle-line"></span>
            <span class="sr-only">Menu</span>
        </button>

        <nav id="primaryNav" class="primary-nav" aria-label="Primary navigation">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">About</a>
            <a href="index.html#courses">Courses</a>
            <a href="index.html#blog">Blog</a>
            <a href="index.html#youtube">YouTube</a>
            <a href="index.html#contact">Contact</a>
        </nav>

        <div class="header-actions">
            <button type="button" class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">Dark</button>
            <button type="button" class="btn btn-primary btn-small" data-whatsapp-open>Contact Us</button>
        </div>
    </div>
</header>

<main>
    <section class="form-container launch-enquiry-page">
        <p class="eyebrow">Registration / Enquiry</p>
        <h1>Contact The Trade Diaries</h1>
        <p>Share your details and we will connect with workshop and batch information.</p>

        <form id="enquiryForm">
            <input type="text" id="firstName" placeholder="First Name" required>
            <input type="text" id="lastName" placeholder="Last Name" required>
            <input type="tel" id="mobile" placeholder="Mobile Number" required>
            <input type="email" id="email" placeholder="Email ID" required>
            <textarea id="message" placeholder="Comment / Enquiry" required></textarea>
            <button type="submit" class="btn btn-primary">Submit Enquiry</button>
        </form>

        <div class="divider">OR</div>
        <button type="button" class="btn btn-secondary whatsapp-button" data-whatsapp-open>WhatsApp Connect</button>
    </section>
</main>

<button class="floating-whatsapp" type="button" aria-label="Connect on WhatsApp" data-whatsapp-open>
    <svg viewBox="0 0 32 32" aria-hidden="true">
        <path d="M16 3.2A12.6 12.6 0 0 0 5.1 22.1L3.6 28.8l6.9-1.8A12.6 12.6 0 1 0 16 3.2Zm0 22.8c-1.9 0-3.7-.5-5.3-1.5l-.4-.2-4.1 1.1 1.1-4-.3-.4A10.1 10.1 0 1 1 16 26Zm5.8-7.5c-.3-.2-1.9-.9-2.2-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-.9 1.2-.2.2-.3.2-.6.1-.3-.2-1.3-.5-2.5-1.5-.9-.8-1.6-1.8-1.7-2.1-.2-.3 0-.5.1-.6l.5-.6c.2-.2.2-.3.3-.5.1-.2 0-.4 0-.6l-1-2.3c-.3-.6-.5-.5-.7-.5h-.6c-.2 0-.6.1-.9.4-.3.3-1.2 1.2-1.2 2.9s1.2 3.3 1.4 3.5c.2.2 2.4 3.7 5.9 5.2.8.4 1.5.6 2 .7.8.3 1.6.2 2.2.1.7-.1 1.9-.8 2.2-1.5.3-.8.3-1.4.2-1.5-.1-.2-.3-.3-.6-.4Z"/>
    </svg>
</button>

<div class="whatsapp-modal" id="whatsappModal" aria-hidden="true">
    <div class="whatsapp-modal-panel" role="dialog" aria-modal="true" aria-labelledby="whatsappModalTitle">
        <button class="modal-close" type="button" aria-label="Close WhatsApp form" data-whatsapp-close>&times;</button>
        <p class="eyebrow">Quick Enquiry</p>
        <h2 id="whatsappModalTitle">Connect With Us</h2>
        <form id="quickWhatsappForm" class="launch-form">
            <input type="text" id="quickName" placeholder="Full Name" required>
            <input type="tel" id="quickMobile" placeholder="Mobile Number" required>
            <input type="email" id="quickEmail" placeholder="Email ID" required>
            <textarea id="quickMessage" placeholder="What would you like to know?" required></textarea>
            <button type="submit" class="btn btn-primary">Submit Enquiry</button>
        </form>
    </div>
</div>

<script>
const navToggle = document.querySelector(".nav-toggle");
const primaryNav = document.getElementById("primaryNav");
const themeToggle = document.querySelector("[data-theme-toggle]");
const whatsappModal = document.getElementById("whatsappModal");
const quickWhatsappForm = document.getElementById("quickWhatsappForm");

function setTheme(theme) {
    document.documentElement.dataset.theme = theme;
    localStorage.setItem("ttd-theme", theme);
    if (themeToggle) {
        themeToggle.textContent = theme === "dark" ? "Light" : "Dark";
        themeToggle.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }
}

setTheme(localStorage.getItem("ttd-theme") || "light");

if (themeToggle) {
    themeToggle.addEventListener("click", function() {
        const nextTheme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        setTheme(nextTheme);
    });
}

if (navToggle && primaryNav) {
    navToggle.addEventListener("click", function() {
        const isOpen = navToggle.getAttribute("aria-expanded") === "true";
        navToggle.setAttribute("aria-expanded", String(!isOpen));
        primaryNav.classList.toggle("is-open", !isOpen);
    });

    primaryNav.querySelectorAll("a").forEach(function(link) {
        link.addEventListener("click", function() {
            navToggle.setAttribute("aria-expanded", "false");
            primaryNav.classList.remove("is-open");
        });
    });
}

document.getElementById("enquiryForm").addEventListener("submit", function(event) {
    event.preventDefault();

    const name = `${document.getElementById("firstName").value} ${document.getElementById("lastName").value}`;
    const mobile = document.getElementById("mobile").value;
    const email = document.getElementById("email").value;
    const message = document.getElementById("message").value;
    const subject = encodeURIComponent("New enquiry for The Trade Diaries");
    const body = encodeURIComponent(`Name: ${name}\nMobile: ${mobile}\nEmail: ${email}\nMessage: ${message}`);

    window.location.href = `mailto:support@thetradediaries.com?subject=${subject}&body=${body}`;
    this.reset();
});

document.querySelectorAll("[data-whatsapp-open]").forEach(function(button) {
    button.addEventListener("click", function() {
        whatsappModal.classList.add("is-open");
        whatsappModal.setAttribute("aria-hidden", "false");
        document.getElementById("quickName").focus();
    });
});

document.querySelectorAll("[data-whatsapp-close]").forEach(function(button) {
    button.addEventListener("click", function() {
        whatsappModal.classList.remove("is-open");
        whatsappModal.setAttribute("aria-hidden", "true");
    });
});

whatsappModal.addEventListener("click", function(event) {
    if (event.target === whatsappModal) {
        whatsappModal.classList.remove("is-open");
        whatsappModal.setAttribute("aria-hidden", "true");
    }
});

quickWhatsappForm.addEventListener("submit", function(event) {
    event.preventDefault();

    const name = document.getElementById("quickName").value;
    const mobile = document.getElementById("quickMobile").value;
    const email = document.getElementById("quickEmail").value;
    const message = document.getElementById("quickMessage").value;
    const subject = encodeURIComponent("New quick enquiry for The Trade Diaries");
    const body = encodeURIComponent(`Name: ${name}\nMobile: ${mobile}\nEmail: ${email}\nMessage: ${message}`);

    window.location.href = `mailto:support@thetradediaries.com?subject=${subject}&body=${body}`;
    this.reset();
    whatsappModal.classList.remove("is-open");
    whatsappModal.setAttribute("aria-hidden", "true");
});
</script>
</body>
</html>
